name: studyflow
description: Premium multilingual study planner for Android and iOS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.18.0
  cupertino_icons: ^1.0.8
  fl_chart: ^0.70.2
  flutter_local_notifications: ^19.2.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.9.1
  table_calendar: ^3.1.3
  uuid: ^4.5.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_logo.png"
flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/branding/
    - assets/illustrations/
    - assets/animations/
    - assets/icons/
