<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="16" y1="12" x2="112" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B6778"/>
      <stop offset="52%" stop-color="#8B7A6A"/>
      <stop offset="100%" stop-color="#E6A15C"/>
    </linearGradient>

    <radialGradient id="gloss" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(34 28) rotate(45) scale(68)">
      <stop offset="0%" stop-color="white" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.16"/>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="clip">
      <rect x="8" y="8" width="112" height="112" rx="28"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g filter="url(#shadow)">
    <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bgGradient)"/>
    <rect x="8.5" y="8.5" width="111" height="111" rx="27.5" stroke="white" stroke-opacity="0.08"/>
    <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#gloss)"/>
  </g>

  <!-- Moving shine -->
  <g clip-path="url(#clip)" opacity="0.5">
    <rect x="-40" y="0" width="28" height="180" rx="14" transform="rotate(18 -40 0)" fill="white" fill-opacity="0.10">
      <animate attributeName="x" values="-50;150" dur="3.4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Sparkles -->
  <g filter="url(#softGlow)" fill="white">
    <!-- Main sparkle -->
    <g transform-origin="50px 47px">
      <path d="M50 31C52.2 42.5 53.8 44.1 65.3 46.3C53.8 48.5 52.2 50.1 50 61.6C47.8 50.1 46.2 48.5 34.7 46.3C46.2 44.1 47.8 42.5 50 31Z" fill-opacity="0.98">
        <animateTransform attributeName="transform" type="scale" values="1;1.08;1" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="fill-opacity" values="0.92;1;0.92" dur="1.8s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Top right sparkle -->
    <g transform-origin="74px 56px">
      <path d="M74 45C75.3 51.5 76.5 52.7 83 54C76.5 55.3 75.3 56.5 74 63C72.7 56.5 71.5 55.3 65 54C71.5 52.7 72.7 51.5 74 45Z" fill-opacity="0.9">
        <animateTransform attributeName="transform" type="scale" values="0.95;1.06;0.95" dur="1.4s" begin="0.2s" repeatCount="indefinite"/>
        <animate attributeName="fill-opacity" values="0.78;1;0.78" dur="1.4s" begin="0.2s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Bottom left sparkle -->
    <g transform-origin="36px 66px">
      <path d="M36 58C37 63 38 64 43 65C38 66 37 67 36 72C35 67 34 66 29 65C34 64 35 63 36 58Z" fill-opacity="0.84">
        <animateTransform attributeName="transform" type="scale" values="0.92;1.04;0.92" dur="1.6s" begin="0.55s" repeatCount="indefinite"/>
        <animate attributeName="fill-opacity" values="0.72;0.95;0.72" dur="1.6s" begin="0.55s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- Very subtle floating -->
  <g opacity="0.22">
    <circle cx="92" cy="34" r="2" fill="white">
      <animate attributeName="cy" values="34;31;34" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="28" cy="90" r="1.8" fill="white">
      <animate attributeName="cy" values="90;87;90" dur="3.1s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.12;0.28;0.12" dur="3.1s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>